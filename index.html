<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://localhost:* blob:; img-src 'self' http://localhost:* https://pbs.twimg.com https://*.twimg.com blob: data:; media-src 'self' http://localhost:* blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:*;">
  <title>ColleX</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="node_modules/plyr/dist/plyr.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="viewport">
    <div id="container">
      <div id="grid"></div>
    </div>
  </div>
  <div id="date-scrollbar" class="date-scrollbar" role="slider" aria-label="Jump by month and year" aria-orientation="vertical" aria-valuemin="1" aria-valuemax="1" aria-valuenow="1" tabindex="0" hidden>
    <div class="date-scrollbar-track" aria-hidden="true"></div>
    <div id="date-scrollbar-dots" class="date-scrollbar-dots" aria-hidden="true"></div>
    <div id="date-scrollbar-thumb" class="date-scrollbar-thumb" aria-hidden="true">
      <span class="date-scrollbar-month">---</span>
      <span class="date-scrollbar-year">----</span>
    </div>
    <div id="date-scrollbar-popover" class="date-scrollbar-popover" aria-hidden="true"></div>
    <div id="date-scrollbar-hover" class="date-scrollbar-hover-preview" aria-hidden="true"></div>
  </div>
  <div id="lightbox-overlay" class="lightbox-overlay">
    <button id="lightbox-close" class="lightbox-close" aria-label="Close">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <div id="lightbox-info" class="lightbox-info">
      <h2 id="lightbox-title" class="lightbox-title">Bookmark Title</h2>
      <a id="lightbox-link" class="lightbox-link" href="#" target="_blank" rel="noopener">View original</a>
    </div>
  </div>
  <script src="node_modules/motion/dist/motion.js"></script>
  <script src="node_modules/jszip/dist/jszip.min.js"></script>
  <script src="node_modules/plyr/dist/plyr.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
